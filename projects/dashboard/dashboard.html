<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Learning Roadmap 2026 | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050b18;
            --bg-card: rgba(15, 23, 42, 0.7);
            --bg-sidebar: rgba(2, 6, 23, 0.8);
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light-mode {
            --bg-dark: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-sidebar: rgba(241, 245, 249, 0.9);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* Ambient Background Glow */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(236, 72, 153, 0.05) 50%, transparent 100%);
            top: -200px;
            right: -200px;
            z-index: -1;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, rgba(139, 92, 246, 0.05) 50%, transparent 100%);
            bottom: -100px;
            left: -100px;
            z-index: -1;
            pointer-events: none;
        }

        /* Sidebar */
        aside {
            width: 320px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            padding: 2rem;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .brand-name h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .overall-stats {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        nav {
            flex: 1;
            overflow-y: auto;
            margin: 0 -1rem;
            padding: 0 1rem;
        }

        nav::-webkit-scrollbar {
            width: 4px;
        }

        nav::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.2);
        }

        .nav-info {
            display: flex;
            flex-direction: column;
        }

        .nav-title {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .nav-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .nav-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            font-weight: 700;
        }

        .nav-badge.complete {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .sidebar-footer {
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 3rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-section {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .phase-title-group h2 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
        }

        .phase-title-group h3 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-dim);
        }

        .theme-toggle:hover {
            color: var(--text-main);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        /* Cards Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-gradient);
            opacity: 0;
            transition: var(--transition);
        }

        .project-card.completed::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .project-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .check-wrapper {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .project-card.completed .check-wrapper {
            background: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .check-icon {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transform: scale(0.5);
            transition: var(--transition);
        }

        .project-card.completed .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .project-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .project-desc {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.6;
            flex: 1;
            margin-bottom: 1.5rem;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid var(--border-color);
        }

        /* Success Animation Overlay */
        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--success);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 5;
        }

        .celebrate .success-overlay {
            animation: flash 0.8s ease-out;
        }

        @keyframes flash {
            0% { opacity: 0; }
            30% { opacity: 0.15; }
            100% { opacity: 0; }
        }

        /* Floating Notifications */
        #notification-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .notification {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent-primary);
            color: var(--text-main);
            padding: 1rem 2rem;
            border-radius: 12px;
            margin-top: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateX(120%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .notification.show {
            transform: translateX(0);
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 1024px) {
            aside { width: 80px; padding: 1.5rem 1rem; }
            .brand-name, .stat-header, .stat-label, .progress-bar-container, .nav-info, .nav-badge, .sidebar-footer { display: none; }
            main { padding: 2rem; }
        }

        @media (max-width: 640px) {
            aside { display: none; }
            main { padding: 1.5rem; }
            .header-section { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <aside>
        <div class="brand">
            <div class="brand-icon">G</div>
            <div class="brand-name">
                <h1>GenAI 2026</h1>
            </div>
        </div>

        <div class="overall-stats">
            <div class="stat-header">
                <span class="stat-value" id="overall-percent">0%</span>
                <span class="stat-label">Mastery</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="overall-progress-bar"></div>
            </div>
            <div style="margin-top: 1rem; font-size: 0.75rem; color: var(--text-dim);">
                <span id="overall-completed">0</span> / <span id="overall-total">0</span> Projects Complete
            </div>
        </div>

        <nav id="phase-nav">
            <!-- Nav items injected by JS -->
        </nav>

        <div class="sidebar-footer">
            <div style="font-size: 0.75rem; color: var(--text-dim);">V2.1.0 Agentic</div>
            <div id="status-dot" style="width: 8px; height: 8px; border-radius: 50%; background: var(--success);"></div>
        </div>
    </aside>

    <main>
        <div class="header-section">
            <div class="phase-title-group">
                <h2 id="current-phase-id">Phase X</h2>
                <h3 id="current-phase-name">Select a Phase</h3>
            </div>
            <div class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </div>
        </div>

        <div class="projects-grid" id="projects-container">
            <!-- Project cards injected by JS -->
        </div>
    </main>

    <div id="notification-container"></div>

    <script>
        let currentProgress = {};
        let currentPhase = 0;
        let roadmapData = [];

        // Define roadmap structure (simplified for JS)
        const phases = [
            { id: 0, name: "Software Baseline", key: "ph0" },
            { id: 1, name: "Foundations", key: "ph1" },
            { id: 2, name: "Python LLM App Development", key: "ph2" },
            { id: 3, name: "Embeddings & Vector Search", key: "ph3" },
            { id: 4, name: "Tool Calling & Workflows", key: "ph4" },
            { id: 5, name: "Evals & Observability", key: "ph5" },
            { id: 6, name: "MCP & Agentic Orchestration", key: "ph6" },
            { id: 7, name: "AI Productivity", key: "ph7" },
            { id: 10, name: "Capstone Projects", key: "ph10" }
        ];

        const projects = [
            { id: "ph0-p0", phase: 0, name: "GenAI Python Starter", desc: "Standardized template with FastAPI, Pydantic, and Docker." },
            
            { id: "ph1-p1", phase: 1, name: "Prompt Playground", desc: "Compare zero-shot vs few-shot prompting techniques." },
            { id: "ph1-p2", phase: 1, name: "Summarizer", desc: "Generate bullet points and action items from long text." },
            { id: "ph1-p3", phase: 1, name: "Rewriter", desc: "Multi-tone rewriting engine (Professional, Friendly, etc)." },
            
            { id: "ph2-p4", phase: 2, name: "CLI Chatbot", desc: "Stateful CLI assistant with session history and persona." },
            { id: "ph2-p5", phase: 2, name: "FastAPI GenAI Service", desc: "Production-ready API for classification and extraction." },
            { id: "ph2-p6", phase: 2, name: "Structured Data Extractor", desc: "JSON schema extraction using Pydantic and LLMs." },
            { id: "ph2-p7", phase: 2, name: "Resume vs JD Analyzer", desc: "Skill gap analysis and improvement suggestions." },
            
            { id: "ph3-p8", phase: 3, name: "Semantic Search Prototype", desc: "Build a baseline vector search using ChromaDB." },
            { id: "ph3-p9", phase: 3, name: "PDF Q&A Assistant", desc: "Complete RAG pipeline for local PDF knowledge bases." },
            { id: "ph3-p10", phase: 3, name: "Docs Knowledge Assistant", desc: "Markdown-based documentation search and reasoning." },
            { id: "ph3-p11", phase: 3, name: "Support Knowledge Bot", desc: "Guardrailed bot answering only from provided knowledge." },
            
            { id: "ph4-p12", phase: 4, name: "Tool-Using Assistant", desc: "Assistant capable of using local tools (Calculator, Files)." },
            { id: "ph4-p13", phase: 4, name: "Research Assistant", desc: "Web-enabled agent with synthesis and citation powers." },
            { id: "ph4-p14", phase: 4, name: "SQL Reporting Assistant", desc: "Safe natural language to SQL bridge for databases." },
            { id: "ph4-p15", phase: 4, name: "Ticket Triage Assistant", desc: "Automated prioritization and routing of support tickets." },
            
            { id: "ph5-p16", phase: 5, name: "Eval Suite", desc: "Automated evaluation of AI outputs using DeepEval." },
            { id: "ph5-p17", phase: 5, name: "Productionize One App", desc: "Full observability stack: LangSmith, tracing, and logging." },
            
            { id: "ph6-p18", phase: 6, name: "Simple MCP Server", desc: "Build and expose your first MCP server (Tools/Resources)." },
            { id: "ph6-p19", phase: 6, name: "Python MCP Utility", desc: "Utility server for local dev tasks and file operations." },
            { id: "ph6-p20", phase: 6, name: "MCP Agent Integration", desc: "Connect an external agent client to your custom server." },
            { id: "ph6-p21", phase: 6, name: "HITL SQL Assistant", desc: "Human-in-the-loop approval gate for sensitive actions." },
            { id: "ph6-p22", phase: 6, name: "HITL File Agent", desc: "Agent that asks permission before modifying the disk." },
            { id: "ph6-p23", phase: 6, name: "Stateful Research Workflow", desc: "Resumable research agent with durable state." },
            { id: "ph6-p24", phase: 6, name: "LangGraph Multi-Agent", desc: "Multi-agent orchestration with planning and feedback loops." },
            
            { id: "ph7-p25", phase: 7, name: "Dev Productivity Agent", desc: "Assistant that helps summarize repos and generate TODOs." },
            { id: "ph7-p26", phase: 7, name: "Local Coding Utility", desc: "Ollama-powered coding helper in your local terminal." },
            
            { id: "ph10-p27", phase: 10, name: "Unified AI Platform", desc: "ChatGPT clone with Voice, Vision, and Memory." },
            { id: "ph10-p28", phase: 10, name: "Multi-Agent Research Plat", desc: "Platform for massive parallelized research tasks." },
            { id: "ph10-p29", phase: 10, name: "Personal AI Dev Copilot", desc: "Context-aware coding assistant integrated into your flow." }
        ];

        async function init() {
            await fetchProgress();
            renderSidebar();
            switchPhase(2); // Start with active phase
            updateOverallProgress();
        }

        async function fetchProgress() {
            try {
                const response = await fetch('/api/progress');
                currentProgress = await response.json();
            } catch (error) {
                showNotification("Failed to fetch progress", "danger");
            }
        }

        function renderSidebar() {
            const nav = document.getElementById('phase-nav');
            nav.innerHTML = phases.map(phase => {
                const phaseProjects = projects.filter(p => p.phase === phase.id);
                const completed = phaseProjects.filter(p => currentProgress[p.id]).length;
                const total = phaseProjects.length;
                const isComplete = completed === total && total > 0;
                
                return `
                    <div class="nav-item ${currentPhase === phase.id ? 'active' : ''}" onclick="switchPhase(${phase.id})">
                        <div class="nav-info">
                            <span class="nav-title">${phase.name}</span>
                            <span class="nav-meta">Phase ${phase.id}</span>
                        </div>
                        <span class="nav-badge ${isComplete ? 'complete' : ''}">
                            ${completed}/${total}
                        </span>
                    </div>
                `;
            }).join('');
        }

        function switchPhase(phaseId) {
            currentPhase = phaseId;
            const phase = phases.find(p => p.id === phaseId);
            
            document.getElementById('current-phase-id').textContent = `Phase ${phase.id}`;
            document.getElementById('current-phase-name').textContent = phase.name;
            
            // Update sidebar active state
            renderSidebar();
            
            renderProjects();
        }

        function renderProjects() {
            const container = document.getElementById('projects-container');
            const phaseProjects = projects.filter(p => p.phase === currentPhase);
            
            container.innerHTML = phaseProjects.map(project => {
                const isCompleted = currentProgress[project.id];
                return `
                    <div class="project-card ${isCompleted ? 'completed' : ''}" onclick="toggleProject('${project.id}')" id="card-${project.id}">
                        <div class="success-overlay"></div>
                        <div class="card-header">
                            <span class="project-id">${project.id}</span>
                            <div class="check-wrapper">
                                <svg class="check-icon" viewBox="0 0 24 24">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                        </div>
                        <h4 class="project-name">${project.name}</h4>
                        <p class="project-desc">${project.desc}</p>
                        <div class="tags">
                            <span class="tag">GenAI</span>
                            <span class="tag">Python</span>
                            ${project.id.includes('ph6') ? '<span class="tag">MCP</span>' : ''}
                            ${project.id.includes('ph5') ? '<span class="tag">Evals</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleProject(id) {
            const card = document.getElementById(`card-${id}`);
            const wasCompleted = currentProgress[id];
            const endpoint = wasCompleted ? '/api/uncomplete' : '/api/complete';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                
                if (response.ok) {
                    currentProgress[id] = !wasCompleted;
                    
                    if (!wasCompleted) {
                        card.classList.add('celebrate');
                        showNotification(`Completed ${id}!`, "success");
                        setTimeout(() => card.classList.remove('celebrate'), 1000);
                    }
                    
                    renderProjects();
                    renderSidebar();
                    updateOverallProgress();
                }
            } catch (error) {
                showNotification("Update failed", "danger");
            }
        }

        function updateOverallProgress() {
            const total = projects.length;
            const completed = Object.values(currentProgress).filter(v => v).length;
            const percent = Math.round((completed / total) * 100);
            
            document.getElementById('overall-percent').textContent = `${percent}%`;
            document.getElementById('overall-progress-bar').style.width = `${percent}%`;
            document.getElementById('overall-completed').textContent = completed;
            document.getElementById('overall-total').textContent = total;
        }

        function showNotification(message, type) {
            const container = document.getElementById('notification-container');
            const note = document.createElement('div');
            note.className = 'notification';
            if (type === 'success') note.style.borderColor = 'var(--success)';
            if (type === 'danger') note.style.borderColor = 'var(--danger)';
            note.textContent = message;
            container.appendChild(note);
            
            setTimeout(() => note.classList.add('show'), 10);
            setTimeout(() => {
                note.classList.remove('show');
                setTimeout(() => note.remove(), 500);
            }, 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('light-mode')) {
